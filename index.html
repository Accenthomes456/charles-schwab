<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schwab Login | Charles Schwab</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <!-- Header -->
            <div class="login-header">
                <div class="logo">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="45" fill="#003366" opacity="0.9"/>
                        <text x="50" y="60" font-size="40" font-weight="bold" fill="white" text-anchor="middle">S</text>
                    </svg>
                </div>
                <h1>Charles Schwab</h1>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Username or Account Number</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Enter your username or account number"
                        required
                        autocomplete="username"
                    >
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input-group">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" class="toggle-password" id="togglePassword">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-options">
                    <div class="checkbox-group">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <label for="rememberMe" class="checkbox-label">Remember me</label>
                    </div>
                    <a href="#" class="forgot-password-link">Forgot your password?</a>
                </div>

                <button type="submit" class="login-button">Log In</button>

                <span class="error-message" id="formError"></span>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>or</span>
            </div>

            <!-- Alternative Login Options -->
            <div class="alternative-login">
                <button type="button" class="alt-login-button biometric">
                    <span class="icon">🔐</span>
                    <span>Login with Biometric</span>
                </button>
            </div>

            <!-- Footer Links -->
            <div class="login-footer">
                <p>New to Schwab? <a href="#" class="signup-link">Open an account</a></p>
                <div class="footer-links">
                    <a href="#">Security Center</a>
                    <span class="separator">|</span>
                    <a href="#">Help</a>
                    <span class="separator">|</span>
                    <a href="#">Privacy</a>
                </div>
            </div>
        </div>

        <!-- Right Panel - Marketing Message -->
        <div class="marketing-panel">
            <div class="marketing-content">
                <h2>Investing Reimagined</h2>
                <p>Trade with confidence. Access powerful tools and market data to maximize your potential.</p>
                
                <div class="features">
                    <div class="feature">
                        <div class="feature-icon">📊</div>
                        <p>Advanced Trading Tools</p>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">💡</div>
                        <p>Expert Guidance</p>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">🛡️</div>
                        <p>Industry-Leading Security</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
